name: Draft release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Verify tag and package versions
        run: node scripts/release.mjs verify "${{ github.ref_name }}"

      - name: Verify
        run: pnpm verify

  make:
    name: Make ${{ matrix.platform }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Make desktop distributable
        run: pnpm make:desktop

      - name: Collect release artifacts
        run: node scripts/release.mjs collect apps/desktop/out/make release-assets

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: amend-${{ matrix.platform }}-${{ runner.arch }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  draft:
    name: Create draft prerelease
    needs: make
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace
        with:
          install-dependencies: "false"

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: amend-*
          path: downloaded-artifacts

      - name: Collect and checksum release artifacts
        run: |
          node scripts/release.mjs collect downloaded-artifacts release-assets
          node scripts/release.mjs checksums release-assets release-assets/SHA256SUMS.txt

      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if release_is_draft=$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null); then
            if [ "$release_is_draft" != "true" ]; then
              echo "Release $GITHUB_REF_NAME is already published; refusing to replace it."
              exit 1
            fi
            while IFS= read -r asset_name; do
              if [ ! -f "release-assets/$asset_name" ]; then
                gh release delete-asset "$GITHUB_REF_NAME" "$asset_name" --yes
              fi
            done < <(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --draft \
              --prerelease \
              --generate-notes \
              --title "Amend ${GITHUB_REF_NAME#v}" \
              --verify-tag
          fi
